<section class="bg-[#F4F4F4] h-full rounded-[20px] py-7.5 px-8.75 flex flex-col overflow-y-auto scrollbar-hide">
    <div class="flex items-center gap-2.5 mb-3.75 pb-3.75 border-b border-[#D1D1D1] shrink-0">
        @for(filter of ordersFilters; track filter){
        <button (click)="selectFilter(filter.value)"
            [style.color]="(selectedFilter === filter.value || hoveredFilter === filter.value) ? filter.activeColor : '#17171733'"
            (mouseenter)="hoveredFilter = filter.value" (mouseleave)="hoveredFilter = null"
            class="flex items-center gap-0.5 transition-colors duration-150 ease-in">
            @switch (filter.value) {
            @case ('all-orders') {
            <svg width="19" height="19" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 10.625H10" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M5 8.125H7.5" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                <path
                    d="M8.125 1.5625V1.875C8.125 3.64277 8.125 4.52665 8.67419 5.07582C9.22338 5.625 10.1073 5.625 11.875 5.625H12.1875M12.5 6.66056V8.75C12.5 11.107 12.5 12.2856 11.7677 13.0177C11.0356 13.75 9.857 13.75 7.5 13.75C5.14298 13.75 3.96447 13.75 3.23223 13.0177C2.5 12.2856 2.5 11.107 2.5 8.75V5.9099C2.5 3.88176 2.5 2.86769 3.05379 2.18083C3.16567 2.04207 3.29207 1.91568 3.43083 1.80379C4.11769 1.25 5.13176 1.25 7.15988 1.25C7.60088 1.25 7.82131 1.25 8.02325 1.32126C8.06525 1.33608 8.10638 1.35312 8.14656 1.37234C8.33975 1.46472 8.49562 1.62063 8.80744 1.93243L11.7677 4.89277C12.1291 5.25406 12.3097 5.4347 12.4049 5.66441C12.5 5.89412 12.5 6.14959 12.5 6.66056Z"
                    stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            }

            @case ('delivered') {
            <svg width="19" height="19" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M9.36279 4.38477C9.36279 4.38477 9.67529 4.69727 9.98779 5.32227C9.98779 5.32227 10.9804 3.75977 11.8628 3.44727"
                    stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                <path
                    d="M6.24678 1.26313C4.68524 1.19702 3.47883 1.37691 3.47883 1.37691C2.71704 1.43138 1.25716 1.85845 1.25718 4.35263C1.25719 6.82561 1.24103 9.87436 1.25718 11.0897C1.25718 11.8323 1.71694 13.5644 3.30829 13.6572C5.24256 13.77 8.72671 13.794 10.3253 13.6572C10.7532 13.633 12.1779 13.2971 12.3582 11.747C12.545 10.1412 12.5078 9.02523 12.5078 8.75961"
                    stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                <path
                    d="M13.7501 4.38477C13.7501 6.11065 12.3497 7.50979 10.6221 7.50979C8.89458 7.50979 7.49414 6.11065 7.49414 4.38477C7.49414 2.65888 8.89458 1.25977 10.6221 1.25977C12.3497 1.25977 13.7501 2.65888 13.7501 4.38477Z"
                    stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M4.36279 8.13477H6.86277" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M4.36279 10.6348H9.36277" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            }

            @case ('unfulfilled') {
            <svg width="19" height="19" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M6.24678 1.26313C4.68524 1.19702 3.47883 1.37691 3.47883 1.37691C2.71704 1.43138 1.25716 1.85845 1.25718 4.35263C1.25719 6.82561 1.24103 9.87436 1.25718 11.0897C1.25718 11.8323 1.71694 13.5644 3.30829 13.6572C5.24256 13.77 8.72671 13.794 10.3253 13.6572C10.7532 13.633 12.1779 13.2971 12.3582 11.747C12.545 10.1412 12.5078 9.02523 12.5078 8.75961"
                    stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M4.36279 8.13477H6.86277" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M4.36279 10.6348H9.36277" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path
                    d="M11.3438 4.125C12.6382 4.125 13.6875 3.07566 13.6875 1.78125C13.6875 1.34978 13.3377 1 12.9062 1H9.78125C9.34977 1 9 1.34978 9 1.78125C9 3.07566 10.0493 4.125 11.3438 4.125ZM11.3438 4.125C12.6382 4.125 13.6875 5.17434 13.6875 6.46875C13.6875 6.90022 13.3377 7.25 12.9062 7.25H9.78125C9.34977 7.25 9 6.90022 9 6.46875C9 5.17434 10.0493 4.125 11.3438 4.125Z"
                    stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
            }

            @case ('rejected') {
            <svg width="19" height="19" viewBox="0 0 15 15" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                    d="M6.24678 1.26313C4.68524 1.19702 3.47883 1.37691 3.47883 1.37691C2.71704 1.43138 1.25716 1.85845 1.25718 4.35263C1.25719 6.82561 1.24103 9.87436 1.25718 11.0897C1.25718 11.8323 1.71694 13.5644 3.30829 13.6572C5.24256 13.77 8.72671 13.794 10.3253 13.6572C10.7532 13.633 12.1779 13.2971 12.3582 11.747C12.545 10.1412 12.5078 9.02523 12.5078 8.75961"
                    stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M4.36279 8.13477H6.86277" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path d="M4.36279 10.6348H9.36277" stroke="currentColor" stroke-linecap="round"
                    stroke-linejoin="round" />
                <path
                    d="M14 4C14 2.34315 12.6568 1 11 1C9.34315 1 8 2.34315 8 4C8 5.65684 9.34315 7 11 7C12.6568 7 14 5.65684 14 4Z"
                    stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M11.9998 5L10 3M10.0002 5L12 3" stroke="currentColor" stroke-width="0.6" stroke-linecap="round"
                    stroke-linejoin="round" />
            </svg>
            }
            }
            <span class="text-[17px]">{{ filter.label }}</span>
        </button>
        }
    </div>
</section>
