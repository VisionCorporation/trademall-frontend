<section class="relative bg-[#E3E8E1] min-h-screen py-10 md:py-18.75 px-5 md:px-12 lg:px-37.5">
  <h1 class="uppercase text-[36px] md:text-[48px] lg:text-[64px] max-w-full lg:max-w-59 leading-none mb-2.5 text-[#171717]">
    Welcome to trademall
  </h1>
  <p class="text-[18px] md:text-[24px] text-[#171717] mb-7">Select a user type to continue</p>

  <form [formGroup]="userTypeForm" (ngSubmit)="onSubmit()" class="flex flex-col lg:flex-row lg:items-end lg:justify-between gap-8">
    <div class="flex flex-col sm:flex-row items-center gap-5 md:gap-10">
      @for (userType of userTypes; track userType.value) {
        <div
          class="user-type-card bg-white w-full sm:w-60 md:w-76 h-60 md:h-76 rounded-2xl p-5 md:p-7.5 cursor-pointer"
          (click)="selectUserType(userType.value)"
        >
          <input
            type="radio"
            formControlName="userType"
            [value]="userType.value"
            [id]="userType.value"
            class="custom-radio cursor-pointer"
          />
          <h2 class="uppercase text-[24px] md:text-[32px]">{{ userType.name }}</h2>
        </div>
      }
    </div>

    <button
      [disabled]="userTypeForm.get('userType')?.value === ''"
      class="w-full lg:w-auto text-[18px] md:text-[20px] bg-[#171717] hover:opacity-80 transition-opacity duration-200 ease-in px-3.75 py-2 text-white rounded-lg disabled:cursor-not-allowed disabled:opacity-60 text-nowrap"
      [class.cursor-not-allowed]="userTypeForm.get('userType')?.value === ''"
    >
      Create an account
    </button>
  </form>

  <p class="mt-5 text-[#7F7E83] text-[14px] md:text-[15px]">
    By Clicking on "Create an account", you agree to our
    <span class="text-[#2E790E] cursor-pointer">Terms and Conditions</span>
  </p>

  <p class="mt-8 lg:mt-0 lg:absolute lg:bottom-auto lg:top-14.5 text-center lg:right-12.5 text-[16px] md:text-xl z-10">
    Already have an account?
    <a class="text-[#2E790E] py-3 px-3" routerLink="/login">Log In</a>
  </p>
</section>
